# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  nightly_photos_variant_backfill:
    class: "Photos::EnqueueVariantBackfillJob"
    queue: default
    args:
      - <%= ENV.fetch("NIGHTLY_PHOTO_BACKFILL_LIMIT", "300").to_i %>
      - <%= ENV.fetch("NIGHTLY_PHOTO_BACKFILL_LOOKBACK_HOURS", "72").to_i %>
    schedule: "10 2 * * *"

  customs_agents_recalculate_access_restrictions:
    command: "CustomsAgents::RecalculateAccessRestrictionsJob.perform_later"
    schedule: "0 5 * * *"

  photos_cleanup_expired_archives:
    class: "Photos::CleanupExpiredArchivesJob"
    queue: default
    schedule: "0 1 * * *"

staging:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  nightly_photos_variant_backfill:
    class: "Photos::EnqueueVariantBackfillJob"
    queue: default
    args:
      - <%= ENV.fetch("NIGHTLY_PHOTO_BACKFILL_LIMIT", "300").to_i %>
      - <%= ENV.fetch("NIGHTLY_PHOTO_BACKFILL_LOOKBACK_HOURS", "72").to_i %>
    schedule: "10 2 * * *"

  customs_agents_recalculate_access_restrictions:
    command: "CustomsAgents::RecalculateAccessRestrictionsJob.perform_later"
    schedule: "0 5 * * *"

  photos_cleanup_expired_archives:
    class: "Photos::CleanupExpiredArchivesJob"
    queue: default
    schedule: "0 1 * * *"


