common: &default_settings
  license_key: <%= ENV["NEW_RELIC_LICENSE_KEY"] %>
  app_name: <%= ENV.fetch("NEW_RELIC_APP_NAME", "desycon") %>
  monitor_mode: true
  distributed_tracing:
    enabled: true
  application_logging:
    forwarding:
      enabled: true
    metrics:
      enabled: true

development:
  <<: *default_settings
  monitor_mode: false

test:
  <<: *default_settings
  monitor_mode: false

staging:
  <<: *default_settings

production:
  <<: *default_settings
